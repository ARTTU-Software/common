name: CAN DBC Codegen

on:
  pull_request:
    paths:
      - "MAIN_DBC.dbc"
      - "dbc_to_c_builder.py"
      - "drivers/can/can_signal_defs.h"
      - "drivers/can/can_board_defs.h"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate CAN headers
        run: python dbc_to_c_builder.py

      - name: Verify generated files are up to date
        run: git diff --exit-code -- drivers/can/can_signal_defs.h drivers/can/can_board_defs.h